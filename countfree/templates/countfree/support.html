{% load static %}
<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Support — CountFree</title>
    <meta name="description" content="Get help with CountFree.">

    <link rel="icon" type="image/png" href="{% static 'countfree/app-icon.png' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #999999;
            --border: #333333;
            --border-light: #404040;
            --transition: 0.3s ease-in-out;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Nav */
        .nav {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            transition: opacity var(--transition);
        }

        .nav-brand:hover {
            opacity: 0.8;
        }

        .nav-brand img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .nav-brand span {
            font-size: 1rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            font-size: 0.875rem;
            color: var(--text-muted);
            transition: color var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }

        /* Page Content */
        .page-content {
            max-width: 680px;
            padding: 64px 0 80px;
        }

        .page-content h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 48px;
            padding-bottom: 48px;
            border-bottom: 1px solid var(--border);
        }

        .page-content p {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.75;
            margin-bottom: 12px;
        }

        .page-content a {
            color: var(--text-primary);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color var(--transition);
        }

        .page-content a:hover {
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-left {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-left a {
            color: var(--text-secondary);
            transition: color var(--transition);
        }

        .footer-left a:hover {
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 0.875rem;
            color: var(--text-muted);
            transition: color var(--transition);
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .footer-inner {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="nav">
        <div class="container">
            <div class="nav-inner">
                <a href="{% url 'countfree_landing' %}" class="nav-brand">
                    <img src="{% static 'countfree/app-icon.png' %}" alt="CountFree">
                    <span>CountFree</span>
                </a>
                <div class="nav-links">
                    <a href="{% url 'countfree_support' %}" class="active">Support</a>
                    <a href="{% url 'countfree_privacy' %}">Privacy</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container">
        <div class="page-content">
            <h1>Support</h1>

            <p>Having trouble with CountFree or have a feature request? Reach out and I'll get back to you as soon as I can.</p>
            <p><a href="mailto:mckriel@gmail.com">mckriel@gmail.com</a></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-left">
                    Built by <a href="https://www.matthewkriel.com">Matthew Kriel</a>
                </div>
                <div class="footer-links">
                    <a href="{% url 'countfree_support' %}">Support</a>
                    <a href="{% url 'countfree_privacy' %}">Privacy Policy</a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
